##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
#windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
#windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

input {
	kb_layout = us
	follow_mouse = 1
	natural_scroll = false
	sensitivity = 0
}
gestures {
	workspace_swipe_invert = true
	workspace_swipe_distance = 600
}
dwindle {preserve_split = yes}
#bind = SUPER, G, exec, pkill cava || kitty --title cava cava
bind = SUPER, N, exec, swaync-client -t -sw
bind = SUPER, Escape, exec, wlogout
bind = SUPER_SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

#windowrulev2 = float, class:^(swappy)&
#windowrulev2 = center, class:^(swappy)&
#windowrulev2 = size 60% 60%, class:^(swappy)&
#windowrulev2 = noanim, class:^(swappy)&

#windowrulev2 = suppressevent maximize, class:^(swappy)&
#windowrulev2 = workspace current, class:^(swappy)&
windowrule = match:class ^kitty$, no_blur on
windowrule = match:class ^code$, no_blur on
windowrule = match:class ^code$, opacity 0.98 0.98

# --- 1. BONSAI (Top Right) ---
#windowrule = match:class ^rice_bonsai$, float on
#windowrule = match:class ^rice_bonsai$, workspace 1 silent
#windowrule = match:class ^rice_bonsai$, size 450 300
#windowrule = move 100%-470 20, match:class ^rice_bonsai&
#windowrulev2 = float, move 50% 50%, class:^(rice_bonsai)$
windowrule {
    name = bonsai
    match:class = rice_bonsai
    float = true
    workspace = 1 silent
    size = 490 500
    move = 1920-500 90
    no_focus = true
}

windowrule {
    name = bongo_cat
    match:class = steam_app_3419430
    float = true
}

# --- 2. FASTFETCH (Bottom Left) ---
#windowrule = match:class ^rice_fetch$, float on
#windowrule = match:class ^rice_fetch$, workspace 1 silent
#windowrule = match:class ^rice_fetch$, size 500 400
# Position: Starts at x=10 (Left gap), y=550 (Bottom half)
#windowrule = move 20 100%-420, match:class ^rice_fetch$

windowrule {
    name = fetch
    match:class = rice_fetch
    float = true
    workspace = 1 silent
    size = 600 400
    move = 10 1080-410
    no_focus = true
}

# --- 3. CAVA (Bottom Right) ---
#windowrule = match:class ^rice_cava$, float on
#windowrule = match:class ^rice_cava$, workspace 1 silent
#windowrule = match:class ^rice_cava$, size 400 100
# Position: Starts at x=960, y=550
#windowrule = move 100%-420 100%-120, match:class ^rice_cava$
# Remove borders for Cava
#windowrule = match:class ^rice_cava$, border_size 0
windowrule {
    name = cavacava
    match:class = rice_cava
    float = true
    workspace = 1 silent
    size = 600 100
    move = 1920-610 1080-110
    no_focus = true
}

# --- 4. GLOW (TOP LEFT) ---
windowrule {
    name = glowglow
    match:class = rice_glow
    float = true
    workspace = 1 silent
    size = 400 300
    move = 10 90
    no_focus = true
}
# --- 5. SAFETY ---
# Prevent these specific windows from being tiled if you toggle float manually
#windowrule = match:class ^rice_bonsai, no_focus on
#windowrule = match:class ^rice_cava$, no_focus on
#windowrule = match:class ^rice_fetch$, no_focus on

#indowrulev2 = noinitialfocus, class:^(PacketTracer)$
windowrule {
    name = packettracer
    match:class = PacketTracer
}
#windowrulev2 = suppressevent activate activatefocus, class:^(PacketTracer)$
#windowrulev2 = float, class:^(PacketTracer)$, title:^$
#windowrulev2 = nofocus, class:^(PacketTracer)$, title:^$
#windowrulev2 = noinitialfocus, class:^(PacketTracer)$, title:^$
###############
### PLUGINS ###
###############


plugin {
  split-monitor-workspaces {
    count = 5                   # 5 workspaces per monitor
    keep_focused = 0
    enable_persistent_workspaces = 1
  }
}

decoration {
	blur {
		enabled = true
		size = 5
		passes = 2
		new_optimizations = true
	}
}

layerrule[blur-waybar] {
  match:namespace = waybar
  blur = true
}

layerrule[blur-wofi] {
  match:namespace = wofi
  blur = true
}



